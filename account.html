<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mijn Bestellingen · Freezy Drinks</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site">
  <div class="wrap nav">
    <a href="index.html" class="brand"><span class="dot"></span> Freezy Drinks</a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="cart.html">Winkelmandje</a>
      <a href="about.html">Over ons</a>
    </nav>
    <button class="cart-btn" id="logoutBtn">Uitloggen</button>
  </div>
</header>

<div class="dash">
  <div class="dash-head">
    <div>
      <h1>Mijn bestellingen</h1>
    </div>
    <a href="menu.html" class="btn btn-ghost">Nieuwe bestelling</a>
  </div>
  <p class="dash-sub" id="welcome">Bezig met laden…</p>

  <div class="dash-section">
    <div id="orders"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { requireAuth, logout, getMyOrders, STATUSES } from './firebase.js';

const $ = s => document.querySelector(s);
const money = n => '€' + Number(n).toFixed(2).replace('.', ',');

const { user, profile } = await requireAuth();
$('#welcome').textContent = `Ingelogd als ${profile?.name || user.email}.`;
$('#logoutBtn').addEventListener('click', async ()=>{ await logout(); location.href='index.html'; });

function fmtDate(ts){
  if(!ts || !ts.toDate) return '';
  return ts.toDate().toLocaleDateString('nl-NL', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
}

const orders = await getMyOrders(user.uid);
const wrap = $('#orders');
if(orders.length===0){
  wrap.innerHTML = `<div class="order"><p style="color:var(--muted)">Je hebt nog geen bestellingen. <a href="menu.html" style="color:var(--accent)">Bekijk het menu →</a></p></div>`;
} else {
  wrap.innerHTML = orders.map(o=>`
    <div class="order">
      <div class="order-top">
        <span class="oid">Bestelling #${o.id.slice(0,6).toUpperCase()}</span>
        <span class="when">${fmtDate(o.createdAt)}</span>
      </div>
      <div class="order-items">${(o.items||[]).map(i=>`${i.qty}× ${i.name}`).join(' · ')}</div>
      <div class="order-tags">
        <span class="otag">${o.fulfilment==='deliver' ? '🚲 Bezorgen' : '🏫 Ophalen'}</span>
        <span class="otag ${o.payment==='contant'?'otag-cash':'otag-paid'}">${o.paymentStatus || (o.payment==='contant'?'Onbetaald (contant)':'Betaald')}</span>
      </div>
      <div class="order-bottom">
        <span class="status-pill status-${(o.status||'Nieuw').split(' ')[0]}">${o.status||'Nieuw'}</span>
        <span class="total">${money(o.total||0)}</span>
      </div>
    </div>`).join('');
}
</script>
</body>
</html>
